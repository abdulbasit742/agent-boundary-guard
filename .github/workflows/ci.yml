name: ci

on:
  pull_request:
  push:
    branches:
      - main
      - feature/**

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        run: pip install -e .
      - name: Run unit tests
        run: python -m unittest discover -s tests -v
      - name: CLI smoke test
        run: python -m agent_boundary_guard scan tests/fixtures/risky_repo --format json --fail-on critical
